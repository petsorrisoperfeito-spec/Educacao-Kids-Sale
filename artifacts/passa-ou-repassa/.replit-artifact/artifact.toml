kind = "web"
previewPath = "/"
title = "Passa ou Repassa - Landing Page"
version = "1.0.0"
id = "artifacts/passa-ou-repassa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20330

[services.development]
run = "pnpm --filter @workspace/passa-ou-repassa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/passa-ou-repassa", "run", "build" ]
publicDir = "artifacts/passa-ou-repassa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20330"
BASE_PATH = "/"
